apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  role: "KarpenterNodeRole-{{ .Values.CLUSTER_NAME }}" 
  amiSelectorTerms:
    - alias: "al2023@{{ .Values.ALIAS_VERSION }}"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "{{ .Values.CLUSTER_NAME }}" 
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "{{ .Values.CLUSTER_NAME }}" 